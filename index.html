<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <h1>Tic Tac Toe</h1>
    <section class="status-panel" aria-live="polite">
      <p id="status">Player X's turn</p>
    </section>

    <section class="board" aria-label="Tic Tac Toe board" role="grid">
      <button type="button" class="cell" data-index="0" aria-label="Cell 1" role="gridcell"></button>
      <button type="button" class="cell" data-index="1" aria-label="Cell 2" role="gridcell"></button>
      <button type="button" class="cell" data-index="2" aria-label="Cell 3" role="gridcell"></button>
      <button type="button" class="cell" data-index="3" aria-label="Cell 4" role="gridcell"></button>
      <button type="button" class="cell" data-index="4" aria-label="Cell 5" role="gridcell"></button>
      <button type="button" class="cell" data-index="5" aria-label="Cell 6" role="gridcell"></button>
      <button type="button" class="cell" data-index="6" aria-label="Cell 7" role="gridcell"></button>
      <button type="button" class="cell" data-index="7" aria-label="Cell 8" role="gridcell"></button>
      <button type="button" class="cell" data-index="8" aria-label="Cell 9" role="gridcell"></button>
    </section>

    <div class="controls">
      <button type="button" id="resetButton">Restart Game</button>
    </div>
  </main>

  <div id="confetti" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
