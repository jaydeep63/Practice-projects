<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe - Enhanced</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
      --win: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #1d4ed8, #111827 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    .app-shell {
      width: min(420px, calc(100vw - 32px));
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.4);
      position: relative;
      z-index: 10;
    }

    h1 { margin: 0 0 18px; font-size: 2.5rem; text-align: center; }

    #status {
      margin: 0 0 18px;
      text-align: center;
      font-size: 1.1rem;
      color: var(--accent);
      min-height: 1.5em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 2px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 3.5rem;
      font-weight: 700;
      transition: all 0.15s ease;
      cursor: pointer;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
    }

    .cell:disabled { cursor: default; }

    .controls { margin-top: 22px; display: flex; justify-content: center; }

    #resetButton {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #resetButton:hover { transform: translateY(-2px) scale(1.05); }

    /* Confetti Styles */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    .confetti-piece, .popper-piece {
      position: absolute; width: 10px; height: 14px;
      animation: pop 1.1s ease-out forwards;
    }
    @keyframes pop {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
    }

    .status-win { color: var(--win) !important; text-shadow: 0 0 10px rgba(22, 163, 74, 0.5); }
    .status-draw { color: var(--muted) !important; }
  </style>
</head>
<body>
  <main class="app-shell">
    <h1>Tic Tac Toe</h1>
    <p id="status">Player X's turn</p>

    <section class="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </section>

    <div class="controls">
      <button id="resetButton">Restart Game</button>
    </div>
  </main>

  <div id="confetti"></div>

  <script>
    const statusText = document.getElementById('status');
    const cells = Array.from(document.querySelectorAll('.cell'));
    const resetButton = document.getElementById('resetButton');
    const confettiContainer = document.getElementById('confetti');

    const winningPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let boardState = Array(9).fill('');
    let currentPlayer = 'X';
    let gameActive = true;
    let audioCtx = null;

    // --- Audio Logic ---
    function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return false;
        }
        audioCtx = new AudioContextClass();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
      return audioCtx.state === 'running';
    }

    function playTone(freq, dur, type = 'triangle') {
      if (!audioCtx || audioCtx.state !== 'running') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    }

    // --- Visual Effects ---
    function spawnConfetti() {
      confettiContainer.innerHTML = '';
      const colors = ['#38bdf8', '#fbbf24', '#34d399', '#f87171', '#a78bfa'];
      
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.left = Math.random() * 100 + '%';
        piece.style.top = (Math.random() * 20) + '%';
        piece.style.animationDelay = Math.random() * 0.2 + 's';
        confettiContainer.appendChild(piece);
      }
      setTimeout(() => confettiContainer.innerHTML = '', 1200);
    }

    // --- Game Logic ---
    function handleCellClick(e) {
      const cell = e.target;
      const index = cell.dataset.index;

      if (!gameActive || boardState[index] !== '') return;

      initAudio(); // Initialize audio on first user gesture

      boardState[index] = currentPlayer;
      cell.textContent = currentPlayer;
      cell.disabled = true;

      // Play click sound
      playTone(currentPlayer === 'X' ? 440 : 660, 0.1);

      if (checkWin()) {
        gameActive = false;
        statusText.textContent = `Player ${currentPlayer} Wins!`;
        statusText.classList.add('status-win');
        playTone(120, 0.8, 'sawtooth'); // Buzzer
        spawnConfetti();
      } else if (boardState.every(s => s !== '')) {
        gameActive = false;
        statusText.textContent = "It's a Draw!";
        statusText.classList.add('status-draw');
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        statusText.textContent = `Player ${currentPlayer}'s turn`;
      }
    }

    function checkWin() {
      return winningPatterns.some(pattern => {
        return pattern.every(index => boardState[index] === currentPlayer);
      });
    }

    function resetGame() {
      boardState = Array(9).fill('');
      currentPlayer = 'X';
      gameActive = true;
      statusText.textContent = "Player X's turn";
      statusText.className = '';
      cells.forEach(cell => {
        cell.textContent = '';
        cell.disabled = false;
      });
    }

    cells.forEach(cell => {
      cell.addEventListener('click', handleCellClick);
      cell.addEventListener('touchend', event => {
        event.preventDefault();
        handleCellClick(event);
      }, { passive: false });
    });

    resetButton.addEventListener('click', resetGame);
    resetButton.addEventListener('touchend', event => {
      event.preventDefault();
      resetGame(event);
    }, { passive: false });
  </script>
</body>
</html>
